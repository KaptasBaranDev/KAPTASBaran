<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Baran KAPTAŞ | Developer</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
      -webkit-user-select:none;
      -ms-user-select:none;
      user-select:none;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#050816;
      color:white;
      overflow-x:hidden;
      cursor:none;
    }

    /* BACKGROUND */

    body::before{
      content:"";
      position:fixed;
      width:500px;
      height:500px;
      background:radial-gradient(circle,#00f0ff 0%,transparent 70%);
      top:-180px;
      left:-120px;
      opacity:.18;
      filter:blur(70px);
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      width:500px;
      height:500px;
      background:radial-gradient(circle,#ff00ff 0%,transparent 70%);
      bottom:-180px;
      right:-120px;
      opacity:.18;
      filter:blur(70px);
      z-index:-2;
    }

    .top-ball{
      position:fixed;
      width:220px;
      height:220px;
      background:#00ffff;
      border-radius:50%;
      filter:blur(70px);
      top:0;
      right:0;
      opacity:.18;
      z-index:-1;
      animation:float 8s ease-in-out infinite;
    }

    .bottom-ball{
      position:fixed;
      width:240px;
      height:240px;
      background:#ff00ea;
      border-radius:50%;
      filter:blur(70px);
      bottom:0;
      left:0;
      opacity:.18;
      z-index:-1;
      animation:float2 10s ease-in-out infinite;
    }

    @keyframes float{
      0%{transform:translateY(0);}
      50%{transform:translateY(20px);}
      100%{transform:translateY(0);}
    }

    @keyframes float2{
      0%{transform:translateY(0);}
      50%{transform:translateY(-20px);}
      100%{transform:translateY(0);}
    }

    section{
      width:100%;
      min-height:100vh;
      padding:90px 10%;
      position:relative;
    }

    h1,h2,h3{
      color:white;
      text-shadow:
      0 0 5px #00ffff,
      0 0 12px #00ffff;
    }

    p{
      color:#d0d0d0;
      line-height:1.8;
    }

    /* HERO */

    .hero{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .profile-wrapper{
      position:relative;
      width:300px;
      height:300px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;

      animation:dropDown 1.5s ease forwards;
      opacity:0;

      margin-bottom:35px;
    }

    .profile-wrapper::before{
      content:"";
      position:absolute;
      inset:-6px;
      border-radius:50%;

      background:linear-gradient(
        45deg,
        #00ffff,
        #ff00ff,
        #7b2dff,
        #00ffff
      );

      background-size:300% 300%;

      animation:neonBorder 5s linear infinite;

      z-index:0;

      box-shadow:
      0 0 20px rgba(0,255,255,.5),
      0 0 35px rgba(255,0,255,.3);
    }

    .profile-wrapper img{
      position:relative;
      z-index:2;

      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:50%;
      display:block;
    }

    @keyframes neonBorder{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    @keyframes dropDown{
      0%{
        transform:translateY(-250px) scale(.8);
        opacity:0;
        filter:blur(18px);
      }

      100%{
        transform:translateY(0) scale(1);
        opacity:1;
        filter:blur(0);
      }
    }

    .hero h1{
      font-size:4rem;
      margin-bottom:10px;
      animation:fadeUp 1.2s ease forwards;
    }

    .hero h3{
      font-size:1.4rem;
      color:#00ffff;
      margin-bottom:25px;
      font-weight:400;
      animation:fadeUp 1.5s ease forwards;
    }

    .hero p{
      max-width:850px;
      font-size:1.05rem;
      animation:fadeUp 1.8s ease forwards;
    }

    @keyframes fadeUp{
      0%{
        opacity:0;
        transform:translateY(30px);
      }

      100%{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* BUTTONS */

    .buttons{
      margin-top:35px;
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .btn{
      padding:13px 28px;
      border-radius:50px;
      text-decoration:none;
      color:white;

      background:linear-gradient(
        90deg,
        #00d0ff,
        #9900ff
      );

      transition:.35s;
      font-weight:600;

      box-shadow:
      0 0 15px rgba(0,255,255,.3);

      animation:fadeUp 2s ease forwards;
    }

    .btn:hover{
      transform:translateY(-4px);

      box-shadow:
      0 0 25px rgba(255,0,60,.6);
    }

    .section-title{
      text-align:center;
      font-size:2.5rem;
      margin-bottom:50px;
    }

    /* CARDS */

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      backdrop-filter:blur(12px);
      border-radius:25px;
      padding:30px;
      transition:.35s;
      position:relative;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-8px);

      box-shadow:
      0 0 20px rgba(255,0,60,.35);
    }

    .card h3{
      margin-bottom:15px;
      color:#00ffff;
    }

    /* SKILLS */

    .skills{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
      justify-content:center;
    }

    .skill{
      padding:12px 22px;
      border-radius:50px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(0,255,255,.25);
      color:#00ffff;
      transition:.3s;
    }

    .skill:hover{
      transform:scale(1.05);

      box-shadow:
      0 0 12px rgba(255,0,60,.6);
    }

    /* REFERENCES */

    .reference{
      margin-bottom:22px;
      padding:25px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(12px);
      transition:.3s;
    }

    .reference:hover{
      box-shadow:
      0 0 20px rgba(255,0,60,.35);
    }

    .reference h3{
      margin-bottom:10px;
    }

    /* CONTACT */

    .contact-box{
      max-width:850px;
      margin:auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:22px;
    }

    .contact-card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(12px);
      border-radius:22px;
      padding:28px;
      text-align:center;
      transition:.35s;
    }

    .contact-card:hover{
      transform:translateY(-8px);

      box-shadow:
      0 0 18px rgba(255,0,60,.4);
    }

    .contact-card a{
      color:#00ffff;
      text-decoration:none;
      font-weight:600;
      word-break:break-word;
    }

    .contact-card a:hover{
      color:#ff003c;
    }

    footer{
      text-align:center;
      padding:40px;
      border-top:1px solid rgba(255,255,255,.06);
      color:#888;
    }

    /* CUSTOM CURSOR */

    .cursor{
      width:16px;
      height:16px;
      border-radius:50%;
      position:fixed;
      background:#00ffff;
      pointer-events:none;
      z-index:9999;

      box-shadow:
      0 0 10px #00ffff,
      0 0 20px #00ffff;

      transform:translate(-50%,-50%);
      transition:
      background .2s ease,
      box-shadow .2s ease,
      transform .2s ease;
    }

    .cursor-trail{
      width:5px;
      height:5px;
      border-radius:50%;
      position:fixed;
      background:rgba(0,255,255,.18);
      pointer-events:none;
      z-index:9998;

      filter:blur(1px);

      transform:translate(-50%,-50%);
    }

    @media(max-width:768px){

      .hero h1{
        font-size:2.5rem;
      }

      .hero h3{
        font-size:1.1rem;
      }

      section{
        padding:80px 7%;
      }

      .profile-wrapper{
        width:220px;
        height:220px;
      }

      body{
        cursor:auto;
      }

      .cursor,
      .cursor-trail{
        display:none;
      }

    }

  </style>

</head>

<body>

  <div class="top-ball"></div>
  <div class="bottom-ball"></div>

  <!-- HERO -->

  <section class="hero">

    <div class="profile-wrapper">
      <img src="profil.png" alt="Baran Kaptaş">
    </div>

    <h1>Baran Kaptaş</h1>

    <h3>
      Uygulama Geliştiricisi & Web Tasarım ve Kodlama
    </h3>

</body>
</html>
